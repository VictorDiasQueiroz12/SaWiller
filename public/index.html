<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · Orion Capital</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div id="welcomeScreen" class="screen hidden">
    <div class="welcome-card">
      <div class="welcome-badge">✦</div>
      <h1 class="welcome-title">Olá, <span id="welcomeName"></span>!</h1>
      <p class="welcome-sub">Você está autenticado com sucesso.</p>
      <div class="welcome-info">
        <span class="info-label">E-mail da sessão</span>
        <span id="welcomeEmail" class="info-value"></span>
      </div>
      <button id="logoutBtn" class="btn btn-ghost">Sair da conta</button>
    </div>
  </div>

  <div id="authScreen" class="screen">
    <div class="auth-wrapper">

      <aside class="auth-deco" aria-hidden="true">
        <div class="deco-blob"></div>
        <div class="deco-text">
          <span class="deco-brand">Orion Capital</span>
          <p class="deco-quote">"Segurança começa<br/>pela identidade."</p>
        </div>
      </aside>

      <main class="auth-card">

        <div class="tabs" role="tablist">
          <button id="tabLogin" class="tab active" role="tab" aria-selected="true"
                  onclick="switchTab('login')">Entrar</button>
          <button id="tabRegister" class="tab" role="tab" aria-selected="false"
                  onclick="switchTab('register')">Cadastrar</button>
          <div class="tab-indicator" id="tabIndicator"></div>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" class="form" novalidate>
          <div class="form-header">
            <h2 class="form-title">Bem-vindo de volta</h2>
            <p class="form-subtitle">Acesse sua conta</p>
          </div>

          <div class="field">
            <label for="loginEmail">E-mail</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="4" width="20" height="16" rx="3"/><path d="m2 7 10 7 10-7"/>
              </svg>
              <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email"/>
            </div>
            <span class="field-error" id="loginEmailErr"></span>
          </div>

          <div class="field">
            <label for="loginPassword">Senha</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
              <button type="button" class="toggle-pass" onclick="togglePassword('loginPassword', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="loginPasswordErr"></span>
          </div>

          <div id="loginMsg" class="alert hidden"></div>

          <button type="submit" class="btn btn-primary">
            <span>Entrar</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>

          <p class="form-footer">Não tem conta?
            <button type="button" class="link-btn" onclick="switchTab('register')">Cadastre-se</button>
          </p>
        </form>

        <!-- CADASTRO -->
        <form id="registerForm" class="form hidden" novalidate>
          <div class="form-header">
            <h2 class="form-title">Criar conta</h2>
            <p class="form-subtitle">Preencha os dados abaixo</p>
          </div>

          <div class="field">
            <label for="regName">Nome de usuário</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
              <input type="text" id="regName" placeholder="João Silva" autocomplete="username"/>
            </div>
            <span class="field-error" id="regNameErr"></span>
          </div>

          <div class="field">
            <label for="regEmail">E-mail</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="4" width="20" height="16" rx="3"/><path d="m2 7 10 7 10-7"/>
              </svg>
              <input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email"/>
            </div>
            <span class="field-error" id="regEmailErr"></span>
          </div>

          <div class="field">
            <label for="regPassword">Senha</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="regPassword" placeholder="Mín. 6 caracteres" autocomplete="new-password"/>
              <button type="button" class="toggle-pass" onclick="togglePassword('regPassword', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="regPasswordErr"></span>
          </div>

          <div id="registerMsg" class="alert hidden"></div>

          <button type="submit" class="btn btn-primary">
            <span>Criar conta</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>

          <p class="form-footer">Já tem conta?
            <button type="button" class="link-btn" onclick="switchTab('login')">Faça login</button>
          </p>
        </form>

      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
